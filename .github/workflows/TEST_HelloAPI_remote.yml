# Workflow to test the Hello API on the CI server
name: Remote Testbed - HelloAPI
run-name: ${{ format('{0} - {1}', github.workflow, github.event_name == 'push' && github.event.head_commit.message || 'Manual Run') }}
on:
  workflow_dispatch:
  workflow_call:
  push:
    paths:
    - '.github/workflows/TEST_HelloAPI_remote.yml'
    - '.github/actions/test_config/**'
    - 'tests/cases/apis/HelloAPI/remote/**'
    - 'tests/config/**'
    - '!.github/workflows/CI_APIUtils.yml'
    - '!.github/workflows/BUILD_APIUtils.yml'
    - '!.github/actions/**'
    - '!requirements.txt'
    - '!src/**'
    - '!tests/utils/**'

env:
  DEPLOY_URL: ${{ vars.OGD_STAGING_HOST }}/${{ vars.API_BASE_URL }}/utils/${{ github.ref_name }}/app.wsgi

jobs:
  check_deploy:
    name: Check for Existing Deploy
    runs-on: ubuntu-22.04
    concurrency:
      group: ${{ github.repository }}-${{ github.ref }}-${{ github.workflow }}
      cancel-in-progress: true
    
    steps:
    - name: cURL Check Hello Endpoint
      run: curl -Is --fail-with-body ${{ env.DEPLOY_URL }}/hello

  deploy_if_needed:
    name: HelloAPI Deploy (If Needed)
    if: failure()
    uses: ./.github/workflows/DEPLOY_APIUtils.yml
    secrets: inherit
    with:
      branch: ${{ github.ref_name }}
      remove: false

  run_testbed_hello_remote:
    name: Run HelloAPI Remote Testbed
    needs: [check_deploy, deploy_if_needed]
    if: always() && (needs.check_deploy.result == 'success' || needs.deploy_if_needed.result == 'success')
    runs-on: ubuntu-22.04
    concurrency:
      group: ${{ github.repository }}-${{ github.ref }}-${{ github.workflow }}-HelloAPI-remote
      cancel-in-progress: true

    steps:

    - name: Announce testing
      run: echo "Testing HelloAPI endpoint at ${{ env.DEPLOY_URL }}"

  # 1. Local checkout 
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Get Dependencies
      uses: opengamedata/setup-ogd-py-dependencies@v1.0
      with:
        python_version: ${{ vars.OGD_PYTHON_VERSION }}
    - name: Local self-install
      run: python -m pip install -e .
    - name: Set up Config File
      uses: ./.github/actions/test_config
      with:
          verbose_output: "True"
          remote_url: ${{ env.DEPLOY_URL }}

  # 2. Build & configure remote environments

  # 3. Perform tests
    - name: Execute testbed
      run: python -m unittest discover -s tests/cases/apis/HelloAPI/remote -p "t_*.py" -t ./

  # 4. Cleanup & complete
    - name: Upload logs as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: "test-log"
        path: ./*.log
